apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: portfolio-eventlistener
  namespace: portfolio
spec:
  serviceAccountName: pipeline
  triggers:
    - name: github-push
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["push"]
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/ocp-deploy'"
      bindings:
        - ref: portfolio-triggerbinding
      template:
        ref: portfolio-triggertemplate
